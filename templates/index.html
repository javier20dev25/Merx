<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buscador Glassmorfismo Interactivo</title>
<!-- Carga de la fuente Poppins -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <!-- Contenedor Principal para toda la interfaz -->
  <div id="main-container" class="container">
    
    <h1 class="site-title">Merx</h1>

    <p id="info-text" class="info-text hidden">Pega aqui las partidas y notas de seccion o capitulo</p>
    
    <textarea id="main-textarea" placeholder="Describe tu mercancía: qué es, para qué sirve, cómo funciona, de qué está constituida y su finalidad comercial." class="neumorphic-textarea"></textarea>
    <div id="result-container" class="neumorphic-textarea hidden"></div>
    
    <div style="display:flex; gap:30px; align-items: center;">
      <!-- Botón Izquierdo (cambia de ícono) -->
      <button id="left-button" class="glass-btn circle-btn purple-glow" aria-label="Ver categorías">
        <span><!-- El contenido del botón (SVG) se inyecta aquí por JS --></span>
      </button>
      
      <!-- Botón Derecho (cambia de texto) -->
      <button id="right-button" class="glass-btn pill-btn orange-glow">
        <span>Buscar Ubicacion</span>
      </button>
    </div>

    <!-- Nuevo contenedor para el contenido del footer -->
    <div class="page-footer">
      <div class="tech-stack">
        <div class="tags">
          <span class="tag">HTML/CSS/JS</span>
          <span class="tag">Node.js</span>
          <span class="tag">Google Gemini</span>
          <span class="tag">Vercel</span>
          <div class="github-wrapper">
            <a href="https://github.com/javier20dev25/Merx" target="_blank" rel="noopener noreferrer" class="tag github-tag">GitHub</a>
            <small class="github-label">click para ir al repositorio</small>
          </div>
        </div>
      </div>
      <p class="credits">Desarrollado por Javier Astaroth</p>
      <p class="credits">Con documentación de Lic. Axel Troche</p>
      
      <div class="contact-section">
        <h4 id="contact-toggle">Sugerencias o Contacto <span id="contact-arrow">▼</span></h4>
        <div id="contact-collapsible" class="hidden">
          <textarea id="contact-message" class="neumorphic-textarea small" placeholder="Escribe tu mensaje aquí..."></textarea>
          <button id="send-whatsapp" class="whatsapp-btn">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            <span>Enviar mensaje</span>
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- Contenedor para el paso final (Informe) -->
  <div id="report-view" class="container hidden">
    <div id="report-content-wrapper">
      <!-- La animación de carga o el informe se insertarán aquí -->
    </div>
    <button id="reset-button" class="glass-btn pill-btn purple-glow">
      <span>← Volver al inicio</span>
    </button>
  </div>

  <!-- Enlace al script de JavaScript -->
  <script src="/static/main.js"></script>
</body>
</html>
